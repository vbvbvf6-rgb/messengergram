app = "droidgram"
primary_region = "ams"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8000"

[experimental]
  allowed_public_ports = [8000]

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 8000

  [[services.ports]]
    port = 8000
